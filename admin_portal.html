<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BellaPro | Admin Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #c1a35f;
            --dark: #121212;
            --gray: #1e1e1e;
            --text: #ffffff;
        }
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--dark);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-image: radial-gradient(circle at 50% 50%, #1e1e1e 0%, #121212 100%);
        }
        .container {
            background: rgba(30, 30, 30, 0.8);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(193, 163, 95, 0.2);
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        h1 {
            color: var(--primary);
            text-align: center;
            margin-bottom: 30px;
            font-weight: 600;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            opacity: 0.8;
        }
        input, select {
            width: 100%;
            padding: 12px;
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            border-radius: 10px;
            color: white;
            font-family: 'Outfit';
            font-size: 1rem;
            box-sizing: border-box;
        }
        input:focus {
            border-color: var(--primary);
            outline: none;
        }
        button {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            border: none;
            border-radius: 10px;
            color: black;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            margin-top: 10px;
        }
        button:hover {
            background: #d4b87a;
            transform: translateY(-2px);
        }
        .status {
            margin-top: 20px;
            text-align: center;
            padding: 10px;
            border-radius: 8px;
            display: none;
        }
        .success { background: rgba(0, 255, 0, 0.1); color: #00ff00; border: 1px solid #00ff00; }
        .error { background: rgba(255, 0, 0, 0.1); color: #ff0000; border: 1px solid #ff0000; }
    </style>
</head>
<body>
    <div class="container">
        <h1><i class="fas fa-shield-halved"></i> BellaPro Admin</h1>
        <p style="text-align: center; opacity: 0.6; margin-top: -20px; margin-bottom: 30px;">Provisión Manual de Usuarios</p>
        
        <div class="form-group">
            <label>Email del Usuario</label>
            <input type="email" id="email" placeholder="usuario@ejemplo.com">
        </div>

        <div class="form-group">
            <label>Especialidad / App</label>
            <select id="specialty">
                <option value="hair">Peluquería (Hair)</option>
                <option value="nails">Manicuría (Nails)</option>
                <option value="spa">Masajes / Spa</option>
            </select>
        </div>

        <div class="form-group">
            <label>Clave Administrativa</label>
            <input type="password" id="adminKey" placeholder="Tu Clave Secreta">
        </div>

        <button onclick="provisionUser()">ASIGNAR ACCESO GRATIS</button>
        
        <div id="status" class="status"></div>
    </div>

    <script>
        async function provisionUser() {
            const email = document.getElementById('email').value;
            const specialty = document.getElementById('specialty').value;
            const adminKey = document.getElementById('adminKey').value;
            const statusDiv = document.getElementById('status');

            if (!email || !adminKey) {
                alert('Por favor completa todos los campos');
                return;
            }

            statusDiv.style.display = 'block';
            statusDiv.className = 'status';
            statusDiv.innerText = 'Procesando...';

            try {
                // He corregido el ID del proyecto a 'bellapro-d297f'
                const response = await fetch('https://us-central1-bellapro-d297f.cloudfunctions.net/adminProvisionUser', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    mode: 'cors', // Asegurar modo CORS
                    body: JSON.stringify({ email, specialty, adminKey, role: 'PREMIUM' })
                });

                if (response.ok) {
                    const data = await response.json();
                    statusDiv.className = 'status success';
                    statusDiv.innerText = '¡Éxito! Usuario ' + email + ' activado en ' + specialty;
                } else {
                    const error = await response.text();
                    statusDiv.className = 'status error';
                    statusDiv.innerText = 'Error del Servidor: ' + error + ' (Verifica si desplegaste las funciones)';
                }
            } catch (err) {
                statusDiv.className = 'status error';
                statusDiv.innerText = 'Error de conexión: No se pudo contactar al servidor. ¿Desplegaste las funciones de Firebase?';
            }
        }
    </script>
</body>
</html>
