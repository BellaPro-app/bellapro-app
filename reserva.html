<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservar Turno | BellaPro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #EC4899;
            --primary-gradient: linear-gradient(135deg, #EC4899 0%, #db271d 100%);
            --bg: #0a0506;
            --surface: #1a1112;
            --text-p: #ffffff;
            --text-s: #fce7f3;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: 1px solid rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-p);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .booking-card {
            background: var(--surface);
            width: 100%;
            max-width: 500px;
            padding: 40px;
            border-radius: 32px;
            border: var(--glass-border);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .logo {
            width: 80px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        p {
            color: var(--text-s);
            opacity: 0.7;
            margin-bottom: 30px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            opacity: 0.8;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 14px;
            background: var(--glass);
            border: var(--glass-border);
            border-radius: 12px;
            color: white;
            font-size: 15px;
            outline: none;
            -webkit-appearance: none;
            appearance: none;
        }

        select option {
            background-color: var(--surface);
            color: white;
            padding: 10px;
        }

        .btn-reserve {
            background: var(--primary-gradient);
            color: white;
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-reserve:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(236, 72, 153, 0.3);
        }

        .status-msg {
            margin-top: 20px;
            font-size: 14px;
            display: none;
        }
    </style>
    <!-- Meta Pixel Code -->
    <script>
        !function (f, b, e, v, n, t, s) {
            if (f.fbq) return; n = f.fbq = function () {
                n.callMethod ?
                    n.callMethod.apply(n, arguments) : n.queue.push(arguments)
            };
            if (!f._fbq) f._fbq = n; n.push = n; n.loaded = !0; n.version = '2.0';
            n.queue = []; t = b.createElement(e); t.async = !0;
            t.src = v; s = b.getElementsByTagName(e)[0];
            s.parentNode.insertBefore(t, s)
        }(window, document, 'script',
            'https://connect.facebook.net/en_US/fbevents.js');
        fbq('init', '1867733084052554');
        fbq('track', 'PageView');
    </script>
    <noscript><img height="1" width="1" style="display:none"
            src="https://www.facebook.com/tr?id=1867733084052554&ev=PageView&noscript=1" /></noscript>
    <!-- End Meta Pixel Code -->
</head>

<body>
    <div class="booking-card">
        <img src="assets/logo/logo.png" alt="BellaPro" class="logo" id="salon-logo">
        <h1 id="salon-name">Reserva tu Turno</h1>
        <p>Selecciona el servicio y horario que prefieras.</p>

        <form id="booking-form">
            <div class="form-group">
                <label>Nombre y Apellido</label>
                <input type="text" id="cust-name" placeholder="Tu nombre completo" required>
            </div>
            <div class="form-group">
                <label>WhatsApp (con código de área)</label>
                <input type="tel" id="cust-tel" placeholder="Ej: 5491144201180" required>
            </div>
            <div class="form-group">
                <label>Servicio</label>
                <select id="cust-srv" required>
                    <option value="">Seleccionar...</option>
                    <option value="Corte Dama">Corte Dama</option>
                    <option value="Corte Caballero">Corte Caballero</option>
                    <option value="Coloración">Coloración</option>
                    <option value="Mechas/Balayage">Mechas/Balayage</option>
                    <option value="Peinado Evento">Peinado Evento</option>
                    <option value="Baño de Crema">Baño de Crema</option>
                    <option value="Alisado">Alisado</option>
                    <option value="Lavado & Secado">Lavado & Secado</option>
                    <option value="Manicura">Manicura</option>
                    <option value="Depilación Rostro">Depilación Rostro</option>
                </select>
            </div>
            <div class="form-group" id="prof-group" style="display:none">
                <label>Profesional / Estilista</label>
                <select id="cust-prof">
                    <option value="">Cualquier profesional</option>
                </select>
            </div>
            <button type="submit" class="btn-reserve">Solicitar Reserva</button>
        </form>
        <div id="status" class="status-msg"></div>

        <div
            style="margin-top: 30px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.05); font-size: 11px; opacity: 0.5;">
            <p style="margin-bottom: 10px;">2026 © BellaPro | Al reservar aceptas nuestros <a href="legal.html#terminos"
                    style="color: var(--primary); text-decoration: none;">Términos</a> y <a href="legal.html#privacidad"
                    style="color: var(--primary); text-decoration: none;">Privacidad</a>.</p>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        // Configuración de Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCCFp95pg8x4YAJ4prASufTIywvdbHksPE",
            authDomain: "bellapro-d297f.firebaseapp.com",
            projectId: "bellapro-d297f",
            storageBucket: "bellapro-d297f.firebasestorage.app",
            messagingSenderId: "634527697988",
            appId: "1:634527697988:web:f2de382cf883b906dfc011"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Identificar Salón por URL
        const urlParams = new URLSearchParams(window.location.search);
        const salonId = urlParams.get('s');

        async function loadSalon() {
            if (!salonId) {
                document.querySelector('.booking-card').innerHTML = `
                    <img src="assets/logo/logo.png" class="logo" style="opacity:0.3">
                    <h1>Link Inválido</h1>
                    <p>Por favor, solicita el link de reserva correcto a tu salón o estética.</p>
                `;
                return;
            }

            try {
                const doc = await db.collection('users').doc(salonId).get();
                if (doc.exists) {
                    const data = doc.data();
                    const config = data.config || {};
                    document.getElementById('salon-name').innerText = config.name || "Reserva tu Turno";
                    if (config.logo) document.getElementById('salon-logo').src = config.logo;

                    // Cargar servicios dinámicamente según especialidad
                    const specialty = config.specialty || 'hair';
                    const specialtyConfig = {
                        hair: ['Corte Dama', 'Corte Caballero', 'Coloración', 'Mechas/Balayage', 'Peinado Evento', 'Baño de Crema', 'Alisado', 'Lavado & Secado'],
                        nails: ['Esmaltado Semipermanente', 'Uñas Esculpidas', 'Kapping Gel', 'Service Uñas', 'Diseño Advanced', 'Limpieza de Cutículas', 'Perfilado de Cejas', 'Lifting de Pestañas'],
                        spa: ['Masaje Relajante', 'Masaje Descontracturante', 'Limpieza Facial Deep', 'Piedras Calientes', 'Drenaje Linfático', 'Tratamiento Corporal', 'Aromaterapia', 'Reflexología']
                    };

                    const services = specialtyConfig[specialty] || specialtyConfig.hair;
                    const sSelect = document.getElementById('cust-srv');
                    sSelect.innerHTML = '<option value="">Seleccionar...</option>';
                    services.forEach(s => {
                        sSelect.innerHTML += `<option value="${s}">${s}</option>`;
                    });

                    // Cargar profesionales
                    if (config.professionals) {
                        const profs = config.professionals.split(',').map(x => x.trim()).filter(x => x);
                        if (profs.length > 0) {
                            const pSelect = document.getElementById('cust-prof');
                            pSelect.innerHTML = '<option value="">Cualquier profesional</option>';
                            profs.forEach(p => {
                                pSelect.innerHTML += `<option value="${p}">${p}</option>`;
                            });
                            document.getElementById('prof-group').style.display = 'block';
                        }
                    }
                } else {
                    document.querySelector('.booking-card').innerHTML = "<h1>Error</h1><p>El salón no existe o no está registrado.</p>";
                }
            } catch (e) {
                console.error("Error loading salon:", e);
                document.querySelector('.booking-card').innerHTML = "<h1>Error de Conexión</h1><p>No pudimos cargar la información del salón.</p>";
            }
        }

        loadSalon();

        document.getElementById('booking-form').onsubmit = async function (e) {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const status = document.getElementById('status');

            const reserva = {
                client: document.getElementById('cust-name').value,
                phone: document.getElementById('cust-tel').value,
                service: document.getElementById('cust-srv').value,
                professional: document.getElementById('cust-prof').value || '',
                status: 'pendiente',
                createdAt: new Date().toISOString()
            };

            btn.innerText = "Procesando...";
            btn.disabled = true;

            try {
                await db.collection('users').doc(salonId).collection('reservas_publicas').add(reserva);
                status.innerText = "¡Solicitud enviada! Te contactaremos por WhatsApp para confirmar.";
                status.style.display = "block";
                status.style.color = "#00ffcc";
                btn.innerText = "Solicitud Enviada";
            } catch (err) {
                console.error(err);
                status.innerText = "Error: " + err.message;
                status.style.display = "block";
                status.style.color = "#ff4444";
                btn.innerText = "Reintentar";
                btn.disabled = false;
            }
        };
    </script>
</body>

</html>
